{% extends "base.html" %}
{% block title %}编辑课次 - 课时签到系统{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">课次排课</p>
        <h1>编辑课次</h1>
    </div>
    <a class="button" href="{{ url_for('lessons') }}">返回课次</a>
</header>

<section class="panel">
    <form method="post" class="form-grid">
        <div class="field">
            <label>班级</label>
            <select name="class_id" required>
                {% for class_row in classes %}
                <option value="{{ class_row.id }}" {{ 'selected' if lesson.class_id == class_row.id }}>{{ class_row.class_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field"><label>上课日期</label><input name="lesson_date" type="date" value="{{ lesson.lesson_date }}" required></div>
        <div class="field"><label>开始时间</label><input name="start_time" type="time" value="{{ lesson.start_time or '' }}"></div>
        <div class="field"><label>结束时间</label><input name="end_time" type="time" value="{{ lesson.end_time or '' }}"></div>
        <div class="field">
            <label>上课老师</label>
            <select name="teacher_id">
                <option value="">未指定</option>
                {% for teacher in teachers %}
                <option value="{{ teacher.id }}" {{ 'selected' if lesson.teacher_id == teacher.id }}>{{ teacher.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>课程类型</label>
            <select name="lesson_type_id" id="lesson-type-select">
                {% for type in lesson_types %}
                <option value="{{ type.id }}" {{ 'selected' if lesson.lesson_type_id == type.id }}>{{ type.type_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field"><label>课时数量</label><input name="lesson_hours" id="lesson-hours-input" type="number" step="0.5" value="{{ lesson.lesson_hours }}"></div>
        <div class="field"><label>教室</label><input name="classroom" value="{{ lesson.classroom or '' }}"></div>
        <div class="field">
            <label>状态</label>
            <select name="status">
                {% for value, label in lesson_status.items() %}
                <option value="{{ value }}" {{ 'selected' if lesson.status == value }}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field full">
            <label>预设课程</label>
            <select name="course_preset_id" id="course-preset-select">
                <option value="">不选择预设课程，手动填写课程主题</option>
                {% for preset in course_presets %}
                <option
                    value="{{ preset.id }}"
                    data-topic="{{ preset.course_name }}"
                    data-type-id="{{ preset.lesson_type_id or '' }}"
                    data-hours="{{ preset.default_hours }}"
                    {{ 'selected' if lesson.course_preset_id == preset.id }}
                >{{ preset.category }} / {{ preset.stage }} / 第{{ preset.lesson_no }}节 / {{ preset.course_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field full"><label>课程主题</label><input name="lesson_topic" id="lesson-topic-input" value="{{ lesson.lesson_topic or '' }}"></div>
        <div class="field full"><label>备注</label><textarea name="remark">{{ lesson.remark or '' }}</textarea></div>
        <div class="field full"><button class="primary" type="submit">保存修改</button></div>
    </form>
</section>

<script>
    const presetSelect = document.getElementById("course-preset-select");
    const topicInput = document.getElementById("lesson-topic-input");
    const typeSelect = document.getElementById("lesson-type-select");
    const hoursInput = document.getElementById("lesson-hours-input");

    if (presetSelect) {
        presetSelect.addEventListener("change", () => {
            const option = presetSelect.selectedOptions[0];
            if (!option || !option.value) return;
            topicInput.value = option.dataset.topic || "";
            if (option.dataset.typeId) typeSelect.value = option.dataset.typeId;
            if (option.dataset.hours) hoursInput.value = option.dataset.hours;
        });
    }
</script>
{% endblock %}
