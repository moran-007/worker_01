{% extends "base.html" %}
{% block title %}编辑教师 - 课时签到系统{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">教师管理</p>
        <h1>编辑教师</h1>
    </div>
    <a class="button" href="{{ url_for('teachers') }}">返回列表</a>
</header>

<section class="panel">
    <form method="post" class="form-grid compact">
        <div class="field"><label>教师姓名</label><input name="name" required value="{{ teacher.name }}"></div>
        <div class="field"><label>手机号</label><input name="phone" value="{{ teacher.phone or '' }}"></div>
        <div class="field"><label>任教方向</label><input name="subject" value="{{ teacher.subject or '' }}"></div>
        <div class="field">
            <label>状态</label>
            <select name="status">
                <option value="active" {{ 'selected' if teacher.status == 'active' }}>启用</option>
                <option value="inactive" {{ 'selected' if teacher.status == 'inactive' }}>停用</option>
            </select>
        </div>
        <div class="field full"><label>备注</label><textarea name="remark">{{ teacher.remark or '' }}</textarea></div>
        <div class="field full"><button class="primary" type="submit">保存修改</button></div>
    </form>
</section>
{% endblock %}
