{% extends "base.html" %}
{% block title %}编辑预设课程 - 课时签到系统{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">课程库</p>
        <h1>编辑预设课程</h1>
    </div>
    <a class="button" href="{{ url_for('course_presets') }}">返回预设课程</a>
</header>

<section class="panel">
    <form method="post" class="form-grid">
        <div class="field"><label>课程大类</label><input name="category" value="{{ preset.category }}" required></div>
        <div class="field"><label>阶段</label><input name="stage" value="{{ preset.stage }}" required></div>
        <div class="field"><label>第几节课</label><input name="lesson_no" type="number" min="1" step="1" value="{{ preset.lesson_no }}" required></div>
        <div class="field"><label>具体课程名称</label><input name="course_name" value="{{ preset.course_name }}" required></div>
        <div class="field">
            <label>默认课程类型</label>
            <select name="lesson_type_id">
                <option value="">不指定</option>
                {% for type in lesson_types %}
                <option value="{{ type.id }}" {{ 'selected' if preset.lesson_type_id == type.id }}>{{ type.type_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field"><label>默认课时</label><input name="default_hours" type="number" step="0.5" value="{{ preset.default_hours }}"></div>
        <div class="field">
            <label>状态</label>
            <select name="status">
                <option value="active" {{ 'selected' if preset.status == 'active' }}>启用</option>
                <option value="inactive" {{ 'selected' if preset.status == 'inactive' }}>停用</option>
            </select>
        </div>
        <div class="field full"><label>备注</label><textarea name="remark">{{ preset.remark or '' }}</textarea></div>
        <div class="field full"><button class="primary" type="submit">保存修改</button></div>
    </form>
</section>
{% endblock %}
