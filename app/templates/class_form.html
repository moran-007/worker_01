{% extends "base.html" %}
{% block title %}编辑班级 - 课时签到系统{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <p class="eyebrow">班级管理</p>
        <h1>编辑班级</h1>
    </div>
    <a class="button" href="{{ url_for('classes') }}">返回列表</a>
</header>

<section class="panel">
    <form method="post" class="form-grid">
        <div class="field"><label>班级名称</label><input name="class_name" required value="{{ class_row.class_name }}"></div>
        <div class="field"><label>课程方向</label><input name="course_name" value="{{ class_row.course_name or '' }}"></div>
        <div class="field"><label>班级类型</label><input name="class_type" value="{{ class_row.class_type or '' }}"></div>
        <div class="field">
            <label>默认老师</label>
            <select name="teacher_id">
                <option value="">未指定</option>
                {% for teacher in teachers %}
                <option value="{{ teacher.id }}" {{ 'selected' if class_row.teacher_id == teacher.id }}>{{ teacher.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>默认星期</label>
            <select name="default_weekday">
                <option value="">未设置</option>
                {% for value, label in weekday_choices %}
                <option value="{{ value }}" {{ 'selected' if class_row.default_weekday == value }}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field"><label>开始时间</label><input name="default_start_time" type="time" value="{{ class_row.default_start_time or '' }}"></div>
        <div class="field"><label>结束时间</label><input name="default_end_time" type="time" value="{{ class_row.default_end_time or '' }}"></div>
        <div class="field"><label>班级容量</label><input name="capacity" type="number" min="0" value="{{ class_row.capacity or '' }}"></div>
        <div class="field"><label>开班日期</label><input name="start_date" type="date" value="{{ class_row.start_date or '' }}"></div>
        <div class="field"><label>结课日期</label><input name="end_date" type="date" value="{{ class_row.end_date or '' }}"></div>
        <div class="field">
            <label>状态</label>
            <select name="status">
                {% for value, label in class_status.items() %}
                <option value="{{ value }}" {{ 'selected' if class_row.status == value }}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field full"><label>备注</label><textarea name="remark">{{ class_row.remark or '' }}</textarea></div>
        <div class="field full"><button class="primary" type="submit">保存修改</button></div>
    </form>
</section>
{% endblock %}
